<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Spell A Word</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .title {
      color: white;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      font-weight: 800;
      text-align: center;
      margin-bottom: 2rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
      letter-spacing: -0.02em;
    }

    /* Microphone button */
    .mic-btn {
      width: clamp(120px, 30vw, 180px);
      height: clamp(120px, 30vw, 180px);
      border-radius: 50%;
      border: none;
      background: white;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      position: relative;
      z-index: 1;
    }

    .mic-btn:active {
      transform: scale(0.92);
    }

    .mic-btn.listening {
      animation: pulse 1.2s ease-in-out infinite;
      background: #ff6b6b;
    }

    .mic-btn.listening .mic-icon {
      fill: white;
    }

    .mic-icon {
      width: 40%;
      height: 40%;
      fill: #764ba2;
      transition: fill 0.2s ease;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 8px 30px rgba(0,0,0,0.2); }
      50% { transform: scale(1.08); box-shadow: 0 8px 50px rgba(255,107,107,0.4); }
    }

    /* Word display stage */
    .word-stage {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .word-stage.active {
      opacity: 1;
      pointer-events: auto;
    }

    .display-word {
      font-size: clamp(3rem, 15vw, 7rem);
      font-weight: 900;
      color: white;
      text-shadow: 0 4px 20px rgba(0,0,0,0.2);
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      letter-spacing: 0.05em;
      text-align: center;
      padding: 0 1rem;
    }

    @keyframes popIn {
      0% { transform: scale(0.3); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .tap-hint {
      color: rgba(255,255,255,0.7);
      font-size: 1rem;
      margin-top: 3rem;
      animation: fadeIn 0.5s ease 0.5s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Error message */
    .error-msg {
      position: fixed;
      bottom: 15%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.95);
      color: #e74c3c;
      padding: 1rem 2rem;
      border-radius: 1rem;
      font-size: 1.1rem;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      text-align: center;
      max-width: 90vw;
    }

    .error-msg.show {
      opacity: 1;
    }

    /* Listening indicator text */
    .listening-text {
      color: rgba(255,255,255,0.8);
      font-size: clamp(0.9rem, 3vw, 1.2rem);
      margin-top: 1.5rem;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .listening-text.show {
      opacity: 1;
    }

    /* Confetti canvas */
    canvas#confetti {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>

  <div class="title">How to spell ... ?</div>

  <button class="mic-btn" id="micBtn" aria-label="Tap to speak">
    <svg class="mic-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
      <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
    </svg>
  </button>

  <div class="listening-text" id="listeningText">Listening...</div>

  <!-- Word display stage -->
  <div class="word-stage" id="wordStage">
    <div class="display-word" id="displayWord"></div>
    <div class="tap-hint" id="tapHint" style="display:none">Tap anywhere to try another word</div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <canvas id="confetti"></canvas>

  <script>
    // === Bad word filter ===
    const BLOCKED_WORDS = new Set([
      // Common swear words
      'fuck','fck','fuk','fucc','fux','phuck','fucker','fucking','fucked','fucks',
      'shit','shyt','sh1t','shiit',
      'damn','dammit','damnit',
      'hell','hells',
      'bitch','biatch','betch',
      'ass','arse','asses',' asshole','asshole',
      'bastard','basterd',
      'crap',
      'dick','dik','d1ck',
      'cock','cok',
      'piss','pis',
      'slut','slt',
      'whore','hore','wh0re',
      'twat',
      'retard','retarded',
      // Racial slurs / hate speech
      'nigger','nigga','n1gger','n1gga','ngr','kike','spic','chink','gook','wetback',
      // Harmful / violent
      'kill','murder','die','suicide','bomb','gun','weapon',
      // Drug references
      'drugs','drug','cocaine','heroin','meth','weed','marijuana','lsd','ecstasy',
      // Sexual content
      'porn','sex','sexy','nude','naked','boobs','penis','vagina',
    ]);

    // Also block partial matches for some patterns
    const BLOCKED_PATTERNS = [
      /\bf+u+c+k+/i,
      /\bs+h+i+t+/i,
      /\ba+s+s+h+o+l+e/i,
      /\bn+i+g+(g|a)/i,
    ];

    function isWordBlocked(word) {
      const clean = word.toLowerCase().replace(/[^a-z]/g, '');
      if (BLOCKED_WORDS.has(clean)) return true;
      for (const pattern of BLOCKED_PATTERNS) {
        if (pattern.test(clean)) return true;
      }
      return false;
    }

    // === Confetti ===
    const confettiCanvas = document.getElementById('confetti');
    const ctx = confettiCanvas.getContext('2d');
    let particles = [];
    let animating = false;

    function resizeCanvas() {
      confettiCanvas.width = window.innerWidth;
      confettiCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function launchConfetti() {
      particles = [];
      const colours = ['#ffd93d', '#ff6b6b', '#4ecdc4', '#45b7d1', '#f7dc6f', '#bb8fce', '#ffffff'];
      for (let i = 0; i < 120; i++) {
        particles.push({
          x: Math.random() * confettiCanvas.width,
          y: -10 - Math.random() * 100,
          w: 6 + Math.random() * 6,
          h: 4 + Math.random() * 4,
          vx: (Math.random() - 0.5) * 4,
          vy: 2 + Math.random() * 4,
          rot: Math.random() * Math.PI * 2,
          rotV: (Math.random() - 0.5) * 0.2,
          colour: colours[Math.floor(Math.random() * colours.length)],
          life: 1,
        });
      }
      if (!animating) {
        animating = true;
        animateConfetti();
      }
    }

    function animateConfetti() {
      ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      let alive = false;
      for (const p of particles) {
        if (p.life <= 0) continue;
        alive = true;
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.08;
        p.rot += p.rotV;
        p.life -= 0.005;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.colour;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      }
      if (alive) {
        requestAnimationFrame(animateConfetti);
      } else {
        animating = false;
        ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      }
    }

    // === Speech Recognition ===
    const micBtn = document.getElementById('micBtn');
    const listeningText = document.getElementById('listeningText');
    const wordStage = document.getElementById('wordStage');
    const displayWord = document.getElementById('displayWord');
    const tapHint = document.getElementById('tapHint');
    const errorMsg = document.getElementById('errorMsg');

    let isListening = false;
    let isAnimating = false;

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      micBtn.style.display = 'none';
      showError('Your browser does not support voice input. Try Chrome or Safari.');
    }

    const recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.maxAlternatives = 3;

    recognition.onresult = (event) => {
      const alternatives = [];
      for (let i = 0; i < event.results[0].length; i++) {
        alternatives.push(event.results[0][i].transcript.toLowerCase());
      }
      const word = extractWord(alternatives);
      if (word) {
        showWord(word);
      } else {
        showError("I didn't catch that! Try saying a word like 'cat' or 'family'.");
        stopListening();
      }
    };

    recognition.onerror = (event) => {
      if (event.error === 'no-speech') {
        showError("I didn't hear anything. Tap the button and try again!");
      } else if (event.error === 'not-allowed') {
        showError("Microphone access denied. Please allow microphone access in your browser settings.");
      } else {
        showError("Oops! Something went wrong. Tap the button to try again.");
      }
      stopListening();
    };

    recognition.onend = () => {
      stopListening();
    };

    // === Word Extraction ===
    function extractWord(alternatives) {
      const patterns = [
        /(?:how to|how do you|how do|can you|could you)\s+spell\s+(\w+)/i,
        /(?:what is|what's|whats)\s+(?:the word\s+)?(?:for\s+)?(\w+)/i,
        /spell\s+(\w+)/i,
        /(?:tell me|say)\s+(?:how to spell\s+)?(\w+)/i,
      ];

      for (const alt of alternatives) {
        for (const pattern of patterns) {
          const match = alt.match(pattern);
          if (match && match[1].length >= 2) {
            return match[1].toLowerCase();
          }
        }
      }

      // Fallback: take the last word that's at least 2 letters
      for (const alt of alternatives) {
        const words = alt.split(/\s+/).filter(w => w.length >= 2 && /^[a-z]+$/i.test(w));
        if (words.length > 0) {
          return words[words.length - 1].toLowerCase();
        }
      }

      return null;
    }

    // === Show Word ===
    async function showWord(word) {
      isAnimating = true;
      stopListening();

      // Check word filter
      if (isWordBlocked(word)) {
        showError("Let's try a different word!");
        isAnimating = false;
        return;
      }

      // Show word stage
      wordStage.classList.add('active');
      tapHint.style.display = 'none';

      // Display the word with capitalised first letter
      displayWord.textContent = word.charAt(0).toUpperCase() + word.slice(1);
      tapHint.style.display = 'block';

      // Confetti!
      launchConfetti();

      // Wait for tap to restart
      await waitForTap();
      hideWordStage();
      isAnimating = false;
    }

    // === Wait for tap ===
    function waitForTap() {
      return new Promise((resolve) => {
        const handler = () => {
          wordStage.removeEventListener('click', handler);
          resolve();
        };
        wordStage.addEventListener('click', handler);
      });
    }

    // === UI Helpers ===
    function startListening() {
      if (isAnimating) return;
      try {
        recognition.start();
        isListening = true;
        micBtn.classList.add('listening');
        listeningText.classList.add('show');
      } catch (e) {}
    }

    function stopListening() {
      try { recognition.stop(); } catch (e) {}
      isListening = false;
      micBtn.classList.remove('listening');
      listeningText.classList.remove('show');
    }

    function hideWordStage() {
      wordStage.classList.remove('active');
      tapHint.style.display = 'none';
      displayWord.textContent = '';
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
      setTimeout(() => errorMsg.classList.remove('show'), 4000);
    }

    // === Event Listeners ===
    micBtn.addEventListener('click', () => {
      if (isAnimating) return;
      if (isListening) {
        stopListening();
      } else {
        startListening();
      }
    });
  </script>

</body>
</html>
