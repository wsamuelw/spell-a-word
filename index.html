<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Spell A Word</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .title {
      color: white;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      font-weight: 800;
      text-align: center;
      margin-bottom: 2rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
      letter-spacing: -0.02em;
    }

    /* Microphone button */
    .mic-btn {
      width: clamp(120px, 30vw, 180px);
      height: clamp(120px, 30vw, 180px);
      border-radius: 50%;
      border: none;
      background: white;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      position: relative;
      z-index: 1;
    }

    .mic-btn:active {
      transform: scale(0.92);
    }

    .mic-btn.listening {
      animation: pulse 1.2s ease-in-out infinite;
      background: #ff6b6b;
    }

    .mic-btn.listening .mic-icon {
      fill: white;
    }

    .mic-icon {
      width: 40%;
      height: 40%;
      fill: #764ba2;
      transition: fill 0.2s ease;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 8px 30px rgba(0,0,0,0.2); }
      50% { transform: scale(1.08); box-shadow: 0 8px 50px rgba(255,107,107,0.4); }
    }

    /* Letter display */
    .letter-stage {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .letter-stage.active {
      opacity: 1;
      pointer-events: auto;
    }

    .current-letter {
      font-size: clamp(6rem, 30vw, 12rem);
      font-weight: 900;
      color: white;
      text-shadow: 0 4px 20px rgba(0,0,0,0.2);
      animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      min-height: 1.2em;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes popIn {
      0% { transform: scale(0.3); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .word-progress {
      display: flex;
      gap: 0.5rem;
      margin-top: 2rem;
    }

    .word-progress .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transition: background 0.3s ease, transform 0.3s ease;
    }

    .word-progress .dot.done {
      background: white;
      transform: scale(1.2);
    }

    .word-progress .dot.current {
      background: #ffd93d;
      transform: scale(1.3);
      box-shadow: 0 0 10px rgba(255,217,61,0.5);
    }

    /* Full word display */
    .full-word {
      font-size: clamp(2.5rem, 10vw, 5rem);
      font-weight: 900;
      color: #ffd93d;
      text-shadow: 0 3px 15px rgba(0,0,0,0.2);
      margin-top: 1.5rem;
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      letter-spacing: 0.05em;
    }

    .tap-hint {
      color: rgba(255,255,255,0.7);
      font-size: 1rem;
      margin-top: 3rem;
      animation: fadeIn 0.5s ease 0.5s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Error message */
    .error-msg {
      position: fixed;
      bottom: 15%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.95);
      color: #e74c3c;
      padding: 1rem 2rem;
      border-radius: 1rem;
      font-size: 1.1rem;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      text-align: center;
      max-width: 90vw;
    }

    .error-msg.show {
      opacity: 1;
    }

    /* Listening indicator text */
    .listening-text {
      color: rgba(255,255,255,0.8);
      font-size: clamp(0.9rem, 3vw, 1.2rem);
      margin-top: 1.5rem;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .listening-text.show {
      opacity: 1;
    }

    /* Confetti canvas */
    canvas#confetti {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>

  <div class="title">How do you spell it?</div>

  <button class="mic-btn" id="micBtn" aria-label="Tap to speak">
    <svg class="mic-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
      <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
    </svg>
  </button>

  <div class="listening-text" id="listeningText">Listening...</div>

  <!-- Letter display stage -->
  <div class="letter-stage" id="letterStage">
    <div class="current-letter" id="currentLetter"></div>
    <div class="word-progress" id="wordProgress"></div>
    <div class="full-word" id="fullWord" style="display:none"></div>
    <div class="tap-hint" id="tapHint" style="display:none">Tap anywhere to try another word</div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <canvas id="confetti"></canvas>

  <!-- Minimal confetti — no dependency needed -->
  <script>
    // === Confetti ===
    const confettiCanvas = document.getElementById('confetti');
    const ctx = confettiCanvas.getContext('2d');
    let particles = [];
    let animating = false;

    function resizeCanvas() {
      confettiCanvas.width = window.innerWidth;
      confettiCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function launchConfetti() {
      particles = [];
      const colours = ['#ffd93d', '#ff6b6b', '#4ecdc4', '#45b7d1', '#f7dc6f', '#bb8fce', '#ffffff'];
      for (let i = 0; i < 120; i++) {
        particles.push({
          x: Math.random() * confettiCanvas.width,
          y: -10 - Math.random() * 100,
          w: 6 + Math.random() * 6,
          h: 4 + Math.random() * 4,
          vx: (Math.random() - 0.5) * 4,
          vy: 2 + Math.random() * 4,
          rot: Math.random() * Math.PI * 2,
          rotV: (Math.random() - 0.5) * 0.2,
          colour: colours[Math.floor(Math.random() * colours.length)],
          life: 1,
        });
      }
      if (!animating) {
        animating = true;
        animateConfetti();
      }
    }

    function animateConfetti() {
      ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      let alive = false;
      for (const p of particles) {
        if (p.life <= 0) continue;
        alive = true;
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.08;
        p.rot += p.rotV;
        p.life -= 0.005;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.colour;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      }
      if (alive) {
        requestAnimationFrame(animateConfetti);
      } else {
        animating = false;
        ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      }
    }

    // === Speech Recognition ===
    const micBtn = document.getElementById('micBtn');
    const listeningText = document.getElementById('listeningText');
    const letterStage = document.getElementById('letterStage');
    const currentLetter = document.getElementById('currentLetter');
    const wordProgress = document.getElementById('wordProgress');
    const fullWord = document.getElementById('fullWord');
    const tapHint = document.getElementById('tapHint');
    const errorMsg = document.getElementById('errorMsg');

    let isListening = false;
    let isAnimating = false;

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      micBtn.style.display = 'none';
      showError('Your browser does not support voice input. Try Chrome or Safari.');
    }

    const recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.maxAlternatives = 3;

    recognition.onresult = (event) => {
      const alternatives = [];
      for (let i = 0; i < event.results[0].length; i++) {
        alternatives.push(event.results[0][i].transcript.toLowerCase());
      }
      const word = extractWord(alternatives);
      if (word) {
        spellWord(word);
      } else {
        showError("I didn't catch that! Try saying a word like 'cat' or 'family'.");
        stopListening();
      }
    };

    recognition.onerror = (event) => {
      if (event.error === 'no-speech') {
        showError("I didn't hear anything. Tap the button and try again!");
      } else if (event.error === 'not-allowed') {
        showError("Microphone access denied. Please allow microphone access in your browser settings.");
      } else {
        showError("Oops! Something went wrong. Tap the button to try again.");
      }
      stopListening();
    };

    recognition.onend = () => {
      stopListening();
    };

    // === Word Extraction ===
    function extractWord(alternatives) {
      // Common patterns: "how to spell X", "spell X", "how do you spell X", "what is X", "X"
      const patterns = [
        /(?:how to|how do you|how do|can you|could you)\s+spell\s+(\w+)/i,
        /(?:what is|what's|whats)\s+(?:the word\s+)?(?:for\s+)?(\w+)/i,
        /spell\s+(\w+)/i,
        /(?:tell me|say)\s+(?:how to spell\s+)?(\w+)/i,
      ];

      for (const alt of alternatives) {
        for (const pattern of patterns) {
          const match = alt.match(pattern);
          if (match && match[1].length >= 2) {
            return match[1].toLowerCase();
          }
        }
      }

      // Fallback: take the last word that's at least 2 letters
      for (const alt of alternatives) {
        const words = alt.split(/\s+/).filter(w => w.length >= 2 && /^[a-z]+$/i.test(w));
        if (words.length > 0) {
          return words[words.length - 1].toLowerCase();
        }
      }

      return null;
    }

    // === Spell Word ===
    async function spellWord(word) {
      isAnimating = true;
      stopListening();

      // Show letter stage
      letterStage.classList.add('active');
      fullWord.style.display = 'none';
      tapHint.style.display = 'none';

      // Build progress dots
      wordProgress.innerHTML = '';
      const letters = word.split('');
      letters.forEach(() => {
        const dot = document.createElement('div');
        dot.className = 'dot';
        wordProgress.appendChild(dot);
      });

      // Spell each letter
      for (let i = 0; i < letters.length; i++) {
        const letter = letters[i].toUpperCase();

        // Update progress dots
        const dots = wordProgress.querySelectorAll('.dot');
        dots.forEach((d, idx) => {
          d.className = 'dot' + (idx < i ? ' done' : idx === i ? ' current' : '');
        });

        // Show letter with animation
        currentLetter.style.animation = 'none';
        currentLetter.offsetHeight; // force reflow
        currentLetter.style.animation = 'popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        currentLetter.textContent = letter;

        // Speak the letter
        await speak(letter);

        // Wait a beat between letters
        await delay(400);
      }

      // Mark all dots done
      const dots = wordProgress.querySelectorAll('.dot');
      dots.forEach(d => d.className = 'dot done');

      // Show the full word
      currentLetter.textContent = '';
      fullWord.textContent = word.charAt(0).toUpperCase() + word.slice(1);
      fullWord.style.display = 'block';
      tapHint.style.display = 'block';

      // Speak the full word
      await speak(word.charAt(0).toUpperCase() + word.slice(1));

      // Confetti!
      launchConfetti();

      // Wait for tap to restart
      await waitForTap();
      hideLetterStage();
      isAnimating = false;
    }

    // === TTS ===
    function speak(text) {
      return new Promise((resolve) => {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 0.8;
        utterance.pitch = 1.1;
        utterance.volume = 1;

        // Try to pick a nice voice
        const voices = speechSynthesis.getVoices();
        const preferred = voices.find(v => v.name.includes('Samantha')) ||
                         voices.find(v => v.name.includes('Google') && v.lang.startsWith('en')) ||
                         voices.find(v => v.lang.startsWith('en'));
        if (preferred) utterance.voice = preferred;

        utterance.onend = resolve;
        utterance.onerror = resolve;
        speechSynthesis.speak(utterance);
      });
    }

    function delay(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    // === Wait for tap ===
    function waitForTap() {
      return new Promise((resolve) => {
        const handler = () => {
          letterStage.removeEventListener('click', handler);
          resolve();
        };
        letterStage.addEventListener('click', handler);
      });
    }

    // === UI Helpers ===
    function startListening() {
      if (isAnimating) return;
      try {
        recognition.start();
        isListening = true;
        micBtn.classList.add('listening');
        listeningText.classList.add('show');
      } catch (e) {
        // Already started
      }
    }

    function stopListening() {
      try { recognition.stop(); } catch (e) {}
      isListening = false;
      micBtn.classList.remove('listening');
      listeningText.classList.remove('show');
    }

    function hideLetterStage() {
      letterStage.classList.remove('active');
      fullWord.style.display = 'none';
      tapHint.style.display = 'none';
      currentLetter.textContent = '';
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
      setTimeout(() => errorMsg.classList.remove('show'), 4000);
    }

    // === Event Listeners ===
    micBtn.addEventListener('click', () => {
      if (isAnimating) return;
      if (isListening) {
        stopListening();
      } else {
        startListening();
      }
    });

    // Pre-load voices (some browsers need this)
    speechSynthesis.getVoices();
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
  </script>

</body>
</html>
