<!DOCTYPE html>
<html lang="en">
<head>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-YG9J93G0R4"></script>
<script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Spell A Word</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      background: #fafafa;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      color: #1d1d1f;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
    }

    .title {
      font-size: 1.125rem;
      font-weight: 500;
      color: #86868b;
      letter-spacing: -0.01em;
    }

    /* Mic button */
    .mic-btn {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: none;
      background: #1d1d1f;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease, background 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .mic-btn:active {
      transform: scale(0.93);
    }

    .mic-btn.listening {
      background: #ff3b30;
      animation: breathe 2s ease-in-out infinite;
    }

    .mic-icon {
      width: 28px;
      height: 28px;
      fill: white;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .listening-text {
      font-size: 0.875rem;
      color: #86868b;
      opacity: 0;
      transition: opacity 0.2s ease;
      height: 1.2em;
    }

    .listening-text.show {
      opacity: 1;
    }

    /* Word display */
    .word-stage {
      position: fixed;
      inset: 0;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .word-stage.active {
      opacity: 1;
      pointer-events: auto;
    }

    .display-word {
      font-size: clamp(3.5rem, 18vw, 6rem);
      font-weight: 700;
      color: #1d1d1f;
      letter-spacing: -0.03em;
      animation: fadeUp 0.35s ease;
      text-align: center;
      padding: 0 1.5rem;
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .tap-hint {
      font-size: 0.8125rem;
      color: #aeaeb2;
      margin-top: 4rem;
      opacity: 0;
      animation: fadeIn 0.3s ease 0.4s both;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* Error */
    .error-msg {
      position: fixed;
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%);
      background: #1d1d1f;
      color: white;
      padding: 0.875rem 1.5rem;
      border-radius: 100px;
      font-size: 0.875rem;
      font-weight: 500;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      text-align: center;
      max-width: 85vw;
      white-space: nowrap;
    }

    .error-msg.show {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="title">Say. How to spell ... ?</div>

    <button class="mic-btn" id="micBtn" aria-label="Tap to speak">
      <svg class="mic-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
      </svg>
    </button>

    <div class="listening-text" id="listeningText">Listening...</div>
  </div>

  <div class="word-stage" id="wordStage">
    <div class="display-word" id="displayWord"></div>
    <div class="tap-hint" id="tapHint" style="display:none">Tap to try another word</div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <script>
    // === Google Analytics Event Tracking ===
    function trackEvent(eventName, params = {}) {
      if (typeof gtag !== 'undefined') {
        gtag('event', eventName, params);
      }
    }

    // Track session duration
    let sessionStartTime = Date.now();
    window.addEventListener('beforeunload', () => {
      const sessionDuration = Math.round((Date.now() - sessionStartTime) / 1000);
      trackEvent('session_duration', {
        duration_seconds: sessionDuration,
        browser: navigator.userAgent,
        device_type: getDeviceType(),
        platform: navigator.platform
      });
    });

    // Track browser and device info on page load
    function getDeviceType() {
      const userAgent = navigator.userAgent.toLowerCase();
      if (/mobile|android|iphone|ipad|ipod/i.test(userAgent)) {
        return 'mobile';
      } else if (/tablet|ipad|android(?!.*mobile)/i.test(userAgent)) {
        return 'tablet';
      } else {
        return 'desktop';
      }
    }

    function getBrowserInfo() {
      const userAgent = navigator.userAgent;
      let browser = 'Unknown';
      let version = 'Unknown';
      
      if (userAgent.indexOf('Chrome') > -1 && userAgent.indexOf('Edg') === -1) {
        browser = 'Chrome';
        version = userAgent.match(/Chrome\/([\d.]+)/)?.[1] || 'Unknown';
      } else if (userAgent.indexOf('Safari') > -1 && userAgent.indexOf('Chrome') === -1) {
        browser = 'Safari';
        version = userAgent.match(/Version\/([\d.]+)/)?.[1] || 'Unknown';
      } else if (userAgent.indexOf('Firefox') > -1) {
        browser = 'Firefox';
        version = userAgent.match(/Firefox\/([\d.]+)/)?.[1] || 'Unknown';
      } else if (userAgent.indexOf('Edg') > -1) {
        browser = 'Edge';
        version = userAgent.match(/Edg\/([\d.]+)/)?.[1] || 'Unknown';
      }
      
      return { browser, version };
    }

    // Send initial page view with browser/device info
    const browserInfo = getBrowserInfo();
    const deviceType = getDeviceType();
    trackEvent('page_view', {
      browser: browserInfo.browser,
      browser_version: browserInfo.version,
      device_type: deviceType,
      platform: navigator.platform,
      language: navigator.language
    });

    // === Bad word filter ===
    const BLOCKED_WORDS = new Set([
      'fuck','fck','fuk','fucc','fux','phuck','fucker','fucking','fucked','fucks',
      'shit','shyt','sh1t','shiit',
      'damn','dammit','damnit',
      'hell','hells',
      'bitch','biatch','betch',
      'ass','arse','asses','asshole',
      'bastard','basterd',
      'crap',
      'dick','dik','d1ck',
      'cock','cok',
      'piss','pis',
      'slut','slt',
      'whore','hore','wh0re',
      'twat',
      'retard','retarded',
      'nigger','nigga','n1gger','n1gga','ngr','kike','spic','chink','gook','wetback',
      'kill','murder','die','suicide','bomb','gun','weapon',
      'drugs','drug','cocaine','heroin','meth','weed','marijuana','lsd','ecstasy',
      'porn','sex','sexy','nude','naked','boobs','penis','vagina',
    ]);

    const BLOCKED_PATTERNS = [
      /\bf+u+c+k+/i,
      /\bs+h+i+t+/i,
      /\ba+s+s+h+o+l+e/i,
      /\bn+i+g+(g|a)/i,
    ];

    function isWordBlocked(word) {
      const clean = word.toLowerCase().replace(/[^a-z]/g, '');
      if (BLOCKED_WORDS.has(clean)) return true;
      for (const pattern of BLOCKED_PATTERNS) {
        if (pattern.test(clean)) return true;
      }
      return false;
    }

    // === Speech Recognition ===
    const micBtn = document.getElementById('micBtn');
    const listeningText = document.getElementById('listeningText');
    const wordStage = document.getElementById('wordStage');
    const displayWord = document.getElementById('displayWord');
    const tapHint = document.getElementById('tapHint');
    const errorMsg = document.getElementById('errorMsg');

    let isListening = false;
    let isAnimating = false;

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      micBtn.style.display = 'none';
      showError('Voice not supported. Try Chrome or Safari.');
    }

    const recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.maxAlternatives = 3;

    recognition.onresult = (event) => {
      const alternatives = [];
      for (let i = 0; i < event.results[0].length; i++) {
        alternatives.push(event.results[0][i].transcript.toLowerCase());
      }
      const word = extractWord(alternatives);
      if (word) {
        showWord(word);
      } else {
        showError("Didn't catch that. Try again.");
        stopListening();
      }
    };

    recognition.onerror = (event) => {
      if (event.error === 'no-speech') {
        showError("Didn't hear anything. Try again.");
      } else if (event.error === 'not-allowed') {
        showError("Microphone access needed.");
      } else {
        showError("Something went wrong. Try again.");
      }
      stopListening();
    };

    recognition.onend = () => {
      stopListening();
    };

    // === Word Extraction ===
    function extractWord(alternatives) {
      // Patterns capture everything after "spell" up to end of string
      // so "how to spell ice cream" → "ice cream"
      const patterns = [
        /(?:how to|how do you|how do|can you|could you)\s+spell\s+(.+)/i,
        /(?:what is|what's|whats)\s+(?:the word\s+)?(?:for\s+)?(.+)/i,
        /spell\s+(.+)/i,
        /(?:tell me|say)\s+(?:how to spell\s+)?(.+)/i,
      ];

      for (const alt of alternatives) {
        for (const pattern of patterns) {
          const match = alt.match(pattern);
          if (match) {
            // Clean: keep only letters and spaces, trim, lowercase
            const cleaned = match[1].replace(/[^a-z\s]/gi, '').trim().toLowerCase();
            if (cleaned.length >= 2) {
              return cleaned;
            }
          }
        }
      }

      // Fallback: last meaningful word
      for (const alt of alternatives) {
        const words = alt.split(/\s+/).filter(w => w.length >= 2 && /^[a-z]+$/i.test(w));
        if (words.length > 0) {
          return words[words.length - 1].toLowerCase();
        }
      }

      return null;
    }

    // === Show Word ===
    async function showWord(word) {
      isAnimating = true;
      stopListening();

      if (isWordBlocked(word)) {
        showError("Let's try a different word!");
        isAnimating = false;
        return;
      }

      // Track word requested
      trackEvent('word_requested', {
        word: word,
        word_length: word.length,
        browser: browserInfo.browser,
        device_type: deviceType
      });

      wordStage.classList.add('active');
      tapHint.style.display = 'none';
      displayWord.textContent = word.charAt(0).toUpperCase() + word.slice(1);
      tapHint.style.display = 'block';

      await waitForTap();
      hideWordStage();
      isAnimating = false;
    }

    function waitForTap() {
      return new Promise((resolve) => {
        const handler = () => {
          wordStage.removeEventListener('click', handler);
          resolve();
        };
        wordStage.addEventListener('click', handler);
      });
    }

    // === UI ===
    function startListening() {
      if (isAnimating) return;
      try {
        recognition.start();
        isListening = true;
        micBtn.classList.add('listening');
        listeningText.classList.add('show');
      } catch (e) {}
    }

    function stopListening() {
      try { recognition.stop(); } catch (e) {}
      isListening = false;
      micBtn.classList.remove('listening');
      listeningText.classList.remove('show');
    }

    function hideWordStage() {
      wordStage.classList.remove('active');
      tapHint.style.display = 'none';
      displayWord.textContent = '';
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
      setTimeout(() => errorMsg.classList.remove('show'), 3000);
    }

    micBtn.addEventListener('click', () => {
      if (isAnimating) return;
      
      // Track mic button click
      trackEvent('mic_button_click', {
        browser: browserInfo.browser,
        device_type: deviceType
      });
      
      if (isListening) {
        stopListening();
      } else {
        startListening();
      }
    });
  </script>

</body>
</html>
