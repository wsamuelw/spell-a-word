<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-YG9J93G0R4', { send_page_view: false });
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      background: #fafafa;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      color: #1d1d1f;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
    }

    .title {
      font-size: 1.25rem;
      font-weight: 500;
      color: #636366;
      letter-spacing: -0.01em;
    }

    /* Mic button */
    .mic-btn {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: none;
      background: #1d1d1f;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease, background 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .mic-btn:active {
      transform: scale(0.93);
    }

    .mic-btn.listening {
      background: #ff3b30;
      animation: breathe 2s ease-in-out infinite;
    }

    .mic-icon {
      width: 28px;
      height: 28px;
      fill: white;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .listening-text {
      font-size: 0.875rem;
      color: #636366;
      opacity: 0;
      transition: opacity 0.2s ease;
      height: 1.2em;
    }

    .listening-text.show {
      opacity: 1;
    }

    /* Waveform container */
    .waveform-container {
      position: fixed;
      bottom: 20%;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 5;
    }

    .waveform-container.show {
      opacity: 1;
    }

    #waveformCanvas {
      width: 100%;
      height: 100%;
    }

    /* Word display */
    .word-stage {
      position: fixed;
      top: 0; right: 0; bottom: 0; left: 0;
      inset: 0;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .word-stage.active {
      opacity: 1;
      pointer-events: auto;
    }

    .display-word {
      font-size: clamp(3.5rem, 18vw, 6rem);
      font-weight: 700;
      color: #1d1d1f;
      letter-spacing: -0.03em;
      animation: fadeUp 0.35s ease;
      text-align: center;
      padding: 0 1.5rem;
      overflow-wrap: break-word;
      word-break: break-word;
      max-width: 100%;
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .tap-hint {
      font-size: 1rem;
      color: #86868b;
      margin-top: 4rem;
      opacity: 0;
      animation: fadeIn 0.3s ease 0.1s both;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* Error */

    .error-msg {
      position: fixed;
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%);
      background: #1d1d1f;
      color: white;
      padding: 0.875rem 1.5rem;
      border-radius: 100px;
      font-size: 0.875rem;
      font-weight: 500;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      text-align: center;
      max-width: 85vw;
      white-space: nowrap;
    }

    .error-msg.show {
      opacity: 1;
    }

  </style>
</head>
<body>

  <div class="container">
    <div class="title">Say. How to spell ... ?</div>

    <button class="mic-btn" id="micBtn" aria-label="Tap to speak">
      <svg class="mic-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
      </svg>
    </button>

    <div class="listening-text" id="listeningText" aria-live="polite">Listening...</div>
  </div>

  <div class="waveform-container" id="waveformContainer">
    <canvas id="waveformCanvas"></canvas>
  </div>

  <div class="word-stage" id="wordStage" tabindex="-1">
    <div class="display-word" id="displayWord" aria-live="polite" role="status"></div>
    <div class="tap-hint" id="tapHint" style="display:none">Tap to try another word</div>
  </div>

  <div class="error-msg" id="errorMsg" role="alert" aria-live="assertive"></div>

  <script>
    // === Google Analytics Event Tracking ===
    function trackEvent(eventName, params = {}) {
      if (typeof gtag !== 'undefined') {
        gtag('event', eventName, params);
      }
    }

    // Track session duration
    let sessionStartTime = Date.now();
    window.addEventListener('beforeunload', () => {
      const sessionDuration = Math.round((Date.now() - sessionStartTime) / 1000);
      trackEvent('session_duration', {
        duration_seconds: sessionDuration,
        browser: browserInfo.browser,
        device_type: deviceType
      });
    });

    // Track browser and device info on page load
    function getDeviceType() {
      const userAgent = navigator.userAgent.toLowerCase();
      if (/mobile|android|iphone|ipad|ipod/i.test(userAgent)) {
        return 'mobile';
      } else if (/tablet|ipad|android(?!.*mobile)/i.test(userAgent)) {
        return 'tablet';
      } else {
        return 'desktop';
      }
    }

    function getBrowserInfo() {
      const userAgent = navigator.userAgent;
      let browser = 'Unknown';
      let version = 'Unknown';
      
      if (userAgent.indexOf('Chrome') > -1 && userAgent.indexOf('Edg') === -1) {
        browser = 'Chrome';
        version = userAgent.match(/Chrome\/([\d.]+)/)?.[1] || 'Unknown';
      } else if (userAgent.indexOf('Safari') > -1 && userAgent.indexOf('Chrome') === -1) {
        browser = 'Safari';
        version = userAgent.match(/Version\/([\d.]+)/)?.[1] || 'Unknown';
      } else if (userAgent.indexOf('Firefox') > -1) {
        browser = 'Firefox';
        version = userAgent.match(/Firefox\/([\d.]+)/)?.[1] || 'Unknown';
      } else if (userAgent.indexOf('Edg') > -1) {
        browser = 'Edge';
        version = userAgent.match(/Edg\/([\d.]+)/)?.[1] || 'Unknown';
      }
      
      return { browser, version };
    }

    // Send initial page view with browser/device info
    const browserInfo = getBrowserInfo();
    const deviceType = getDeviceType();
    trackEvent('page_view', {
      browser: browserInfo.browser,
      browser_version: browserInfo.version,
      device_type: deviceType,
      language: navigator.language
    });

    // === Content Filter ===
    // Load blocked words from external JSON file for easy management
    let BLOCKED_CATEGORIES = {};
    let BLOCKED_WORDS_SET = new Set();
    const FUZZY_PATTERNS = [
      /f+u+c+k+/i,           // fuck variations
      /s+h+i+t+/i,           // shit variations  
      /b+i+t+c+h+/i,         // bitch variations
      /a+s+s+h+o+l+e/i,      // asshole variations
      /n+i+g+(g|a)+/i,       // n-word variations
      /w+h+o+r+e+/i,         // whore variations
      /s+l+u+t+/i,           // slut variations
    ];

    // Load blocked words from JSON file
    async function loadBlockedWords() {
      try {
        const response = await fetch('blocked-words.json');
        if (!response.ok) throw new Error('Failed to load blocked words');
        BLOCKED_CATEGORIES = await response.json();
        
        // Build optimized lookup set from all categories (normalised)
        BLOCKED_WORDS_SET = new Set(
          Object.values(BLOCKED_CATEGORIES).flat().map(w => w.toLowerCase().replace(/[^a-z]/g, ''))
        );
      } catch (error) {
        console.error('Error loading blocked words:', error);
        // Fallback to empty set if loading fails
        BLOCKED_WORDS_SET = new Set();
      }
    }

    function isWordBlocked(word) {
      if (!word || word.length < 2) return false;

      // Lowercase first
      const lower = word.toLowerCase();

      // Apply symbol-to-letter mapping BEFORE stripping non-alpha
      const symbolMapped = lower
        .replace(/@/g, 'a')
        .replace(/!/g, 'i')
        .replace(/\$/g, 's')
        .replace(/\*/g, '')
        .replace(/\+/g, 't')
        .replace(/0/g, 'o')
        .replace(/1/g, 'i')
        .replace(/3/g, 'e')
        .replace(/4/g, 'a')
        .replace(/5/g, 's')
        .replace(/7/g, 't');

      // Normalize: remove non-alphabetic chars
      const normalized = symbolMapped.replace(/[^a-z]/g, '');

      // Direct match check (O(1) lookup)
      if (BLOCKED_WORDS_SET.has(normalized)) return true;

      // Fuzzy pattern matching for obfuscated words
      for (const pattern of FUZZY_PATTERNS) {
        if (pattern.test(normalized)) return true;
      }

      return false;
    }

    // === Speech Recognition ===
    const micBtn = document.getElementById('micBtn');
    const listeningText = document.getElementById('listeningText');
    const wordStage = document.getElementById('wordStage');
    const displayWord = document.getElementById('displayWord');
    const tapHint = document.getElementById('tapHint');
    const errorMsg = document.getElementById('errorMsg');
    const waveformContainer = document.getElementById('waveformContainer');
    const waveformCanvas = document.getElementById('waveformCanvas');

    let isListening = false;
    let isAnimating = false;
    let audioContext = null;
    let analyser = null;
    let microphone = null;
    let mediaStream = null;
    let animationId = null;
    let canvasInitialized = false;
    let cachedGradient = null;
    let dataArray = null;

    // Error message mapping (kid-friendly)
    const errorMessages = {
        'not-allowed': "Oops! I need your grown-up to let me use the microphone.",
        'no-microphone': "I can't hear you! Is your microphone working?",
        'network': "Hmm, I can't reach the internet. Ask a grown-up for help?",
        'no-speech': "I didn't hear anything. Try talking a bit louder!",
        'audio-capture': "Something's wrong with the microphone. Let's try again!",
        'default': "Something went wrong. Let's try again!"
    };

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;

    if (!SpeechRecognition) {
      micBtn.style.display = 'none';
      showError('Voice not supported. Try Chrome or Safari.');
    } else {
      recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.interimResults = false;
      recognition.maxAlternatives = 3;

      recognition.onresult = (event) => {
        const alternatives = [];
        for (let i = 0; i < event.results[0].length; i++) {
          alternatives.push(event.results[0][i].transcript.toLowerCase());
        }
        const word = extractWord(alternatives);
        if (word) {
          showWord(word);
        } else {
          showError("Didn't catch that. Try again.");
          stopListening();
        }
      };

      recognition.onerror = (event) => {
        let errorMessage = '';

        // Map error codes to user-friendly messages
        if (event.error === 'no-speech') {
          errorMessage = errorMessages['no-speech'];
        } else if (event.error === 'not-allowed' || event.error === 'permission-denied') {
          errorMessage = errorMessages['not-allowed'];
        } else if (event.error === 'no-microphone' || event.error === 'devices-not-found') {
          errorMessage = errorMessages['no-microphone'];
        } else if (event.error === 'network' || event.error === 'service-not-allowed') {
          errorMessage = errorMessages['network'];
        } else if (event.error === 'audio-capture') {
          errorMessage = errorMessages['audio-capture'];
        } else {
          errorMessage = errorMessages['default'];
        }

        showError(errorMessage);
        stopListening();
      };

      recognition.onend = () => {
        stopListening();
      };
    }

    // Load blocked words (non-blocking — button works immediately)
    loadBlockedWords();

    // === Word Extraction ===
    function extractWord(alternatives) {
      // Patterns capture everything after "spell" up to end of string
      // so "how to spell ice cream" → "ice cream"
      const patterns = [
        /(?:how to|how do you|how do|can you|could you)\s+spell\s+(.+)/i,
        /(?:what is|what's|whats)\s+(?:the word\s+)?(?:for\s+)?(.+)/i,
        /spell\s+(.+)/i,
        /(?:tell me|say)\s+(?:how to spell\s+)?(.+)/i,
      ];

      for (const alt of alternatives) {
        for (const pattern of patterns) {
          const match = alt.match(pattern);
          if (match) {
            // Clean: keep only letters and spaces, trim, lowercase
            const cleaned = match[1].replace(/[^a-z\s]/gi, '').trim().toLowerCase();
            if (cleaned.length >= 2) {
              return cleaned;
            }
          }
        }
      }

      // Fallback: last meaningful word
      for (const alt of alternatives) {
        const words = alt.split(/\s+/).filter(w => w.length >= 2 && /^[a-z]+$/i.test(w));
        if (words.length > 0) {
          return words[words.length - 1].toLowerCase();
        }
      }

      return null;
    }

    // === Show Word ===
    async function showWord(word) {
      isAnimating = true;
      stopListening();

      if (isWordBlocked(word)) {
        showError("That's a tricky one! Try saying a different word.");
        isAnimating = false;
        return;
      }

      // Track word requested (no PII — only word length)
      trackEvent('word_requested', {
        word_length: word.length,
        browser: browserInfo.browser,
        device_type: deviceType
      });

      wordStage.classList.add('active');
      displayWord.textContent = word.charAt(0).toUpperCase() + word.slice(1);
      tapHint.style.display = 'block';
      wordStage.focus();

      await waitForTapOrKey();
      hideWordStage();
      isAnimating = false;
    }

    function waitForTapOrKey() {
      return new Promise((resolve) => {
        const handler = (e) => {
          if (e.type === 'keydown' && e.key !== 'Enter' && e.key !== ' ') return;
          e.preventDefault();
          wordStage.removeEventListener('click', handler);
          wordStage.removeEventListener('keydown', handler);
          resolve();
        };
        wordStage.addEventListener('click', handler);
        wordStage.addEventListener('keydown', handler);
      });
    }

    // === UI ===
    async function startListening() {
      if (isAnimating || isListening || !recognition) return;
      try {
        recognition.start();
        isListening = true;
        micBtn.classList.add('listening');
        listeningText.classList.add('show');
        waveformContainer.classList.add('show');
        await initAudioVisualization();
      } catch (e) {
        console.warn('Failed to start recognition:', e);
        stopListening();
      }
    }

    function stopListening() {
      if (!isListening && !micBtn.classList.contains('listening')) return;
      try { if (recognition) recognition.stop(); } catch (e) {}
      isListening = false;
      micBtn.classList.remove('listening');
      listeningText.classList.remove('show');
      waveformContainer.classList.remove('show');
      stopAudioVisualization();
    }

    function hideWordStage() {
      wordStage.classList.remove('active');
      tapHint.style.display = 'none';
      displayWord.textContent = '';
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
      setTimeout(() => errorMsg.classList.remove('show'), 3000);
    }

    // === Audio Visualization (Waveform) ===
    async function initAudioVisualization() {
      try {
        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
          if (audioContext.state === 'suspended') {
            await audioContext.resume();
          }
          analyser = audioContext.createAnalyser();
          analyser.fftSize = 256;

          mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
          microphone = audioContext.createMediaStreamSource(mediaStream);
          microphone.connect(analyser);
          dataArray = new Uint8Array(analyser.frequencyBinCount);
        }

        canvasInitialized = false;
        drawWaveform();
      } catch (e) {
        console.warn('Audio visualization not available:', e);
        if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') {
          showError(errorMessages['not-allowed']);
        } else if (e.name === 'NotFoundError' || e.name === 'DevicesNotFoundError') {
          showError(errorMessages['no-microphone']);
        } else if (e.name === 'NotReadableError' || e.name === 'TrackStartError') {
          showError(errorMessages['audio-capture']);
        } else {
          showError(errorMessages['default']);
        }
      }
    }

    let cachedRect = null;

    function initCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const rect = waveformCanvas.getBoundingClientRect();
      waveformCanvas.width = rect.width * dpr;
      waveformCanvas.height = rect.height * dpr;
      const ctx = waveformCanvas.getContext('2d');
      ctx.scale(dpr, dpr);

      cachedGradient = ctx.createLinearGradient(0, 0, 0, rect.height);
      cachedGradient.addColorStop(0, '#ff3b30');
      cachedGradient.addColorStop(1, '#ff9500');
      cachedRect = { width: rect.width, height: rect.height };
      canvasInitialized = true;
    }

    function drawWaveform() {
      if (!analyser || !isListening) return;
      if (!canvasInitialized) initCanvas();

      const ctx = waveformCanvas.getContext('2d');
      const { width, height } = cachedRect;

      animationId = requestAnimationFrame(drawWaveform);
      analyser.getByteFrequencyData(dataArray);
      ctx.clearRect(0, 0, width, height);

      const barWidth = (width / dataArray.length) * 2.5;
      let x = 0;
      ctx.fillStyle = cachedGradient;

      for (let i = 0; i < dataArray.length; i++) {
        const barHeight = (dataArray[i] / 255) * height;
        ctx.beginPath();
        if (ctx.roundRect) {
          ctx.roundRect(x, (height - barHeight) / 2, barWidth - 1, barHeight, 2);
        } else {
          ctx.rect(x, (height - barHeight) / 2, barWidth - 1, barHeight);
        }
        ctx.fill();
        x += barWidth + 1;
      }
    }

    function stopAudioVisualization() {
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }

      if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;
      }

      if (microphone) {
        microphone.disconnect();
        microphone = null;
      }

      if (audioContext && audioContext.state !== 'closed') {
        audioContext.close();
        audioContext = null;
        analyser = null;
      }

      canvasInitialized = false;
      cachedGradient = null;
      cachedRect = null;
      dataArray = null;
    }

    micBtn.addEventListener('click', () => {
      if (isAnimating) return;
      
      // Track mic button click
      trackEvent('mic_button_click', {
        browser: browserInfo.browser,
        device_type: deviceType
      });
      
      if (isListening) {
        stopListening();
      } else {
        startListening();
      }
    });
  </script>

</body>
