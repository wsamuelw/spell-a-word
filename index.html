<!DOCTYPE html>
<html lang="en">
<head>
  
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-YG9J93G0R4"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-YG9J93G0R4', {
    send_page_view: false
  });
</script>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>How to Spell</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      background: #fafafa;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      color: #1d1d1f;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
    }

    .title {
      font-size: 1.125rem;
      font-weight: 500;
      color: #86868b;
      letter-spacing: -0.01em;
    }

    /* Mic button */
    .mic-btn {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: none;
      background: #1d1d1f;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease, background 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .mic-btn:active {
      transform: scale(0.93);
    }

    .mic-btn.listening {
      background: #ff3b30;
      animation: breathe 2s ease-in-out infinite;
    }

    .mic-icon {
      width: 28px;
      height: 28px;
      fill: white;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .listening-text {
      font-size: 0.875rem;
      color: #86868b;
      opacity: 0;
      transition: opacity 0.2s ease;
      height: 1.2em;
    }

    .listening-text.show {
      opacity: 1;
    }

    /* Waveform container */
    .waveform-container {
      position: fixed;
      bottom: 20%;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 5;
    }

    .waveform-container.show {
      opacity: 1;
    }

    #waveformCanvas {
      width: 100%;
      height: 100%;
    }

    /* Word display */
    .word-stage {
      position: fixed;
      inset: 0;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .word-stage.active {
      opacity: 1;
      pointer-events: auto;
    }

    .display-word {
      font-size: clamp(3.5rem, 18vw, 6rem);
      font-weight: 700;
      color: #1d1d1f;
      letter-spacing: -0.03em;
      animation: fadeUp 0.35s ease;
      text-align: center;
      padding: 0 1.5rem;
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .tap-hint {
      font-size: 0.8125rem;
      color: #aeaeb2;
      margin-top: 4rem;
      opacity: 0;
      animation: fadeIn 0.3s ease 0.4s both;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* Error */
    .error-msg {
      position: fixed;
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%);
      background: #1d1d1f;
      color: white;
      padding: 0.875rem 1.5rem;
      border-radius: 100px;
      font-size: 0.875rem;
      font-weight: 500;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      text-align: center;
      max-width: 85vw;
      white-space: nowrap;
    }

    .error-msg.show {
      opacity: 1;
    }

    /* Skeleton Loading Styles */
    .skeleton-loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 400px;
      padding: 2rem;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      z-index: 5;
    }

    .skeleton-line {
      height: 24px;
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      border-radius: 8px;
      margin-bottom: 1rem;
      animation: shimmer 1.5s infinite;
    }

    .skeleton-title {
      height: 48px;
      width: 80%;
      margin-bottom: 1.5rem;
    }

    .skeleton-subtitle {
      height: 32px;
      width: 60%;
      margin-bottom: 1rem;
    }

    .skeleton-text {
      height: 20px;
      width: 100%;
    }

    .skeleton-text.short {
      width: 40%;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="title">Say. How to spell ... ?</div>

    <button class="mic-btn" id="micBtn" aria-label="Tap to speak">
      <svg class="mic-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
      </svg>
    </button>

    <div class="listening-text" id="listeningText">Listening...</div>
  </div>

  <div class="waveform-container" id="waveformContainer">
    <canvas id="waveformCanvas"></canvas>
  </div>

  <div class="word-stage" id="wordStage">
    <!-- Skeleton Loading State -->
    <div id="skeletonLoader" class="skeleton-loader" style="display: none;">
      <div class="skeleton-line skeleton-title"></div>
      <div class="skeleton-line skeleton-subtitle"></div>
      <div class="skeleton-line skeleton-text short"></div>
    </div>
    
    <div class="display-word" id="displayWord"></div>
    <div class="tap-hint" id="tapHint" style="display:none">Tap to try another word</div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <script>
    // === Google Analytics Event Tracking ===
    function trackEvent(eventName, params = {}) {
      if (typeof gtag !== 'undefined') {
        gtag('event', eventName, params);
      }
    }

    // Track session duration
    let sessionStartTime = Date.now();
    window.addEventListener('beforeunload', () => {
      const sessionDuration = Math.round((Date.now() - sessionStartTime) / 1000);
      trackEvent('session_duration', {
        duration_seconds: sessionDuration,
        browser: navigator.userAgent,
        device_type: getDeviceType(),
        platform: navigator.platform
      });
    });

    // Track browser and device info on page load
    function getDeviceType() {
      const userAgent = navigator.userAgent.toLowerCase();
      if (/mobile|android|iphone|ipad|ipod/i.test(userAgent)) {
        return 'mobile';
      } else if (/tablet|ipad|android(?!.*mobile)/i.test(userAgent)) {
        return 'tablet';
      } else {
        return 'desktop';
      }
    }

    function getBrowserInfo() {
      const userAgent = navigator.userAgent;
      let browser = 'Unknown';
      let version = 'Unknown';
      
      if (userAgent.indexOf('Chrome') > -1 && userAgent.indexOf('Edg') === -1) {
        browser = 'Chrome';
        version = userAgent.match(/Chrome\/([\d.]+)/)?.[1] || 'Unknown';
      } else if (userAgent.indexOf('Safari') > -1 && userAgent.indexOf('Chrome') === -1) {
        browser = 'Safari';
        version = userAgent.match(/Version\/([\d.]+)/)?.[1] || 'Unknown';
      } else if (userAgent.indexOf('Firefox') > -1) {
        browser = 'Firefox';
        version = userAgent.match(/Firefox\/([\d.]+)/)?.[1] || 'Unknown';
      } else if (userAgent.indexOf('Edg') > -1) {
        browser = 'Edge';
        version = userAgent.match(/Edg\/([\d.]+)/)?.[1] || 'Unknown';
      }
      
      return { browser, version };
    }

    // Send initial page view with browser/device info
    const browserInfo = getBrowserInfo();
    const deviceType = getDeviceType();
    trackEvent('page_view', {
      browser: browserInfo.browser,
      browser_version: browserInfo.version,
      device_type: deviceType,
      platform: navigator.platform,
      language: navigator.language
    });

    // === Bad word filter ===
    const BLOCKED_WORDS = new Set([
      'fuck','fck','fuk','fucc','fux','phuck','fucker','fucking','fucked','fucks',
      'shit','shyt','sh1t','shiit',
      'damn','dammit','damnit',
      'hell','hells',
      'bitch','biatch','betch',
      'ass','arse','asses','asshole',
      'bastard','basterd',
      'crap',
      'dick','dik','d1ck',
      'cock','cok',
      'piss','pis',
      'slut','slt',
      'whore','hore','wh0re',
      'twat',
      'retard','retarded',
      'nigger','nigga','n1gger','n1gga','ngr','kike','spic','chink','gook','wetback',
      'kill','murder','die','suicide','bomb','gun','weapon',
      'drugs','drug','cocaine','heroin','meth','weed','marijuana','lsd','ecstasy',
      'porn','sex','sexy','nude','naked','boobs','penis','vagina',
    ]);

    const BLOCKED_PATTERNS = [
      /\bf+u+c+k+/i,
      /\bs+h+i+t+/i,
      /\ba+s+s+h+o+l+e/i,
      /\bn+i+g+(g|a)/i,
    ];

    function isWordBlocked(word) {
      const clean = word.toLowerCase().replace(/[^a-z]/g, '');
      if (BLOCKED_WORDS.has(clean)) return true;
      for (const pattern of BLOCKED_PATTERNS) {
        if (pattern.test(clean)) return true;
      }
      return false;
    }

    // === Speech Recognition ===
    const micBtn = document.getElementById('micBtn');
    const listeningText = document.getElementById('listeningText');
    const wordStage = document.getElementById('wordStage');
    const displayWord = document.getElementById('displayWord');
    const tapHint = document.getElementById('tapHint');
    const errorMsg = document.getElementById('errorMsg');
    const waveformContainer = document.getElementById('waveformContainer');
    const waveformCanvas = document.getElementById('waveformCanvas');
    const skeletonLoader = document.getElementById('skeletonLoader');

    let isListening = false;
    let isAnimating = false;
    let audioContext = null;
    let analyser = null;
    let microphone = null;
    let animationId = null;
    let currentErrorMessage = '';

    // Error message mapping
    const errorMessages = {
        'not-allowed': 'Microphone access denied. Please allow microphone access in your browser settings.',
        'no-microphone': 'No microphone found. Please connect a microphone and try again.',
        'network': 'Network error. Please check your internet connection and try again.',
        'no-speech': 'No speech detected. Please try speaking more clearly.',
        'audio-capture': 'Unable to capture audio. Please refresh the page and try again.',
        'default': 'An unexpected error occurred. Please try again.'
    };

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      micBtn.style.display = 'none';
      showError('Voice not supported. Try Chrome or Safari.');
    }

    const recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.maxAlternatives = 3;

    recognition.onresult = (event) => {
      const alternatives = [];
      for (let i = 0; i < event.results[0].length; i++) {
        alternatives.push(event.results[0][i].transcript.toLowerCase());
      }
      const word = extractWord(alternatives);
      if (word) {
        showWord(word);
      } else {
        showError("Didn't catch that. Try again.");
        stopListening();
      }
    };

    recognition.onerror = (event) => {
      let errorMessage = '';
      
      // Map error codes to user-friendly messages
      if (event.error === 'no-speech') {
        errorMessage = errorMessages['no-speech'];
      } else if (event.error === 'not-allowed' || event.error === 'permission-denied') {
        errorMessage = errorMessages['not-allowed'];
      } else if (event.error === 'no-microphone' || event.error === 'devices-not-found') {
        errorMessage = errorMessages['no-microphone'];
      } else if (event.error === 'network' || event.error === 'service-not-allowed') {
        errorMessage = errorMessages['network'];
      } else if (event.error === 'audio-capture') {
        errorMessage = errorMessages['audio-capture'];
      } else {
        errorMessage = errorMessages['default'];
      }
      
      showError(errorMessage);
      stopListening();
    };

    recognition.onend = () => {
      stopListening();
    };

    // === Word Extraction ===
    function extractWord(alternatives) {
      // Patterns capture everything after "spell" up to end of string
      // so "how to spell ice cream" → "ice cream"
      const patterns = [
        /(?:how to|how do you|how do|can you|could you)\s+spell\s+(.+)/i,
        /(?:what is|what's|whats)\s+(?:the word\s+)?(?:for\s+)?(.+)/i,
        /spell\s+(.+)/i,
        /(?:tell me|say)\s+(?:how to spell\s+)?(.+)/i,
      ];

      for (const alt of alternatives) {
        for (const pattern of patterns) {
          const match = alt.match(pattern);
          if (match) {
            // Clean: keep only letters and spaces, trim, lowercase
            const cleaned = match[1].replace(/[^a-z\s]/gi, '').trim().toLowerCase();
            if (cleaned.length >= 2) {
              return cleaned;
            }
          }
        }
      }

      // Fallback: last meaningful word
      for (const alt of alternatives) {
        const words = alt.split(/\s+/).filter(w => w.length >= 2 && /^[a-z]+$/i.test(w));
        if (words.length > 0) {
          return words[words.length - 1].toLowerCase();
        }
      }

      return null;
    }

    // === Show Word ===
    async function showWord(word) {
      isAnimating = true;
      stopListening();

      if (isWordBlocked(word)) {
        showError("Let's try a different word!");
        isAnimating = false;
        return;
      }

      // Track word requested
      trackEvent('word_requested', {
        word: word,
        word_length: word.length,
        browser: browserInfo.browser,
        device_type: deviceType
      });

      // Show skeleton loader while preparing to display word
      skeletonLoader.style.display = 'block';
      displayWord.textContent = '';
      
      // Small delay to show skeleton animation for smoother UX
      await new Promise(resolve => setTimeout(resolve, 600));
      
      skeletonLoader.style.display = 'none';
      wordStage.classList.add('active');
      tapHint.style.display = 'none';
      displayWord.textContent = word.charAt(0).toUpperCase() + word.slice(1);
      tapHint.style.display = 'block';

      await waitForTap();
      hideWordStage();
      isAnimating = false;
    }

    function waitForTap() {
      return new Promise((resolve) => {
        const handler = () => {
          wordStage.removeEventListener('click', handler);
          resolve();
        };
        wordStage.addEventListener('click', handler);
      });
    }

    // === UI ===
    async function startListening() {
      if (isAnimating) return;
      try {
        recognition.start();
        isListening = true;
        micBtn.classList.add('listening');
        listeningText.classList.add('show');
        waveformContainer.classList.add('show');
        await initAudioVisualization();
      } catch (e) {}
    }

    function stopListening() {
      try { recognition.stop(); } catch (e) {}
      isListening = false;
      micBtn.classList.remove('listening');
      listeningText.classList.remove('show');
      waveformContainer.classList.remove('show');
      stopAudioVisualization();
    }

    function hideWordStage() {
      wordStage.classList.remove('active');
      tapHint.style.display = 'none';
      skeletonLoader.style.display = 'none';
      displayWord.textContent = '';
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
      setTimeout(() => errorMsg.classList.remove('show'), 3000);
    }

    // === Audio Visualization (Waveform) ===
    async function initAudioVisualization() {
      try {
        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
          analyser = audioContext.createAnalyser();
          analyser.fftSize = 256;
          
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          microphone = audioContext.createMediaStreamSource(stream);
          microphone.connect(analyser);
        }
        
        drawWaveform();
      } catch (e) {
        console.log('Audio visualization not available:', e);
        // Handle specific getUserMedia errors
        if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') {
          showError(errorMessages['not-allowed']);
        } else if (e.name === 'NotFoundError' || e.name === 'DevicesNotFoundError') {
          showError(errorMessages['no-microphone']);
        } else if (e.name === 'NotReadableError' || e.name === 'TrackStartError') {
          showError(errorMessages['audio-capture']);
        } else {
          showError(errorMessages['default']);
        }
      }
    }

    function drawWaveform() {
      if (!analyser || !isListening) return;
      
      const canvas = waveformCanvas;
      const ctx = canvas.getContext('2d');
      const bufferLength = analyser.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);
      
      // Set canvas size for high DPI displays
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);
      
      animationId = requestAnimationFrame(drawWaveform);
      
      analyser.getByteFrequencyData(dataArray);
      
      ctx.clearRect(0, 0, rect.width, rect.height);
      
      const barWidth = (rect.width / bufferLength) * 2.5;
      let x = 0;
      
      // Create gradient
      const gradient = ctx.createLinearGradient(0, 0, 0, rect.height);
      gradient.addColorStop(0, '#ff3b30');
      gradient.addColorStop(1, '#ff9500');
      
      for (let i = 0; i < bufferLength; i++) {
        const barHeight = (dataArray[i] / 255) * rect.height;
        
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.roundRect(x, (rect.height - barHeight) / 2, barWidth - 1, barHeight, 2);
        ctx.fill();
        
        x += barWidth + 1;
      }
    }

    function stopAudioVisualization() {
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
      
      if (microphone) {
        microphone.disconnect();
        microphone = null;
      }
      
      if (audioContext && audioContext.state !== 'closed') {
        audioContext.close();
        audioContext = null;
        analyser = null;
      }
    }

    micBtn.addEventListener('click', () => {
      if (isAnimating) return;
      
      // Track mic button click
      trackEvent('mic_button_click', {
        browser: browserInfo.browser,
        device_type: deviceType
      });
      
      if (isListening) {
        stopListening();
      } else {
        startListening();
      }
    });
  </script>

</body>
</html>
